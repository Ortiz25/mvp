<html>
<head>
  <title>CityNet</title>
  <!--
    MikroTik Hotspot login page — upload to: flash/hotspot/login.html

    RouterOS serves this file to unauthenticated clients instead of
    its built-in login form. We use it purely as a redirect bridge.

    HOW THE FLOW WORKS:
      1. Client connects to CityNet WiFi, tries http://example.com
      2. MikroTik intercepts → serves THIS file from flash/hotspot/login.html
      3. This file immediately redirects to captive.local/ with hotspot params:
           http://captive.local/?mac=AA:BB:CC&ip=192.168.88.x&dst=http://example.com
      4. The React portal on the Pi handles video/survey
      5. After completion, the Pi frontend does:
           window.location.replace('http://192.168.88.1/login?username=MAC&password=MAC&dst=http://example.com')
      6. MikroTik receives that GET from the client browser, matches the MAC,
         grants internet access, redirects browser to http://example.com

    TEMPLATE VARIABLES (RouterOS replaces these before serving the file):
      $(mac)       — client MAC address, e.g. AA:BB:CC:DD:EE:FF
      $(ip)        — client IP address,  e.g. 192.168.88.10
      $(link-orig) — the URL the client originally requested, URL-encoded
                     e.g. http%3A%2F%2Fexample.com

    WHY NOT $(link-login)?
      $(link-login) = the URL of THIS router login page itself.
      Using it as ?dst= causes an infinite loop:
        captive.local → 192.168.88.1/login?dst=captive.local/login → captive.local → ...
      Always use $(link-orig) for the destination.

    WHY META REFRESH + FORM?
      Android captive portal WebView blocks JavaScript on many versions.
      META REFRESH is honoured by the WebView. The <script> form submit
      fires for full browsers. Both produce the same redirect — whichever
      fires first wins.
  -->
  <meta http-equiv="refresh"
    content="0;url=http://captive.local/?mac=$(mac)&ip=$(ip)&dst=$(link-orig)" />
</head>
<body>
  <form name="redirect" action="http://captive.local/" method="get">
    <input type="hidden" name="mac" value="$(mac)" />
    <input type="hidden" name="ip"  value="$(ip)"  />
    <input type="hidden" name="dst" value="$(link-orig)" />
    <noscript>
      <p style="font-family:sans-serif;text-align:center;margin-top:40px;color:#333">
        Tap below to continue to the CityNet portal:
      </p>
      <div style="text-align:center;margin-top:16px">
        <button type="submit"
          style="padding:14px 32px;font-size:16px;border-radius:10px;
                 background:#22d3ee;border:none;color:#000;cursor:pointer;font-weight:bold">
          Continue to Portal →
        </button>
      </div>
    </noscript>
  </form>
  <script>document.redirect.submit();</script>
</body>
</html>

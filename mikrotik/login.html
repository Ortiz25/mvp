<html>
<head>
  <title>CityNet</title>
  <!--
    MikroTik Hotspot login page — flash/hotspot/login.html

    MikroTik template variables used:
      $(mac)        — client MAC address  e.g. AA:BB:CC:DD:EE:FF
      $(ip)         — client IP address   e.g. 192.168.88.10
      $(link-orig)  — the original URL the client was trying to reach
                      (already URL-encoded by RouterOS)

    This page immediately redirects to the captive portal on the Pi.
    The Pi portal handles the video/survey flow, then redirects the browser
    back to MikroTik at:
      http://192.168.88.1/login?username=MAC&password=MAC&dst=ORIGINAL_URL

    IMPORTANT — do NOT include $(link-login) in the redirect URL.
    link-login is the URL of THIS page (the router login page).
    Including it as dst causes an infinite redirect loop:
      captive.local → 192.168.88.1/login?dst=captive.local → captive.local → ...

    We pass dst=$(link-orig) so the Pi receives the user's original destination.
    The Pi backend sanitizes probe URLs (e.g. /generate_204) and replaces them
    with the SUCCESS_REDIRECT (google.com) so the user always ends up somewhere useful.

    Android WebView note:
      The WebView blocks JavaScript in some Android versions. We use a META REFRESH
      tag (which the WebView honours) as the primary redirect, with a form submit
      as fallback. Both approaches are equivalent — pick whichever fires first.
  -->
  <meta http-equiv="refresh"
    content="0;url=http://captive.local/?mac=$(mac)&ip=$(ip)&dst=$(link-orig)" />
</head>
<body>
  <!--
    Fallback form: submits immediately via JavaScript.
    The <noscript> button is for browsers with JS disabled (rare but possible on
    older Symbian/feature phones that may connect to a community hotspot).
  -->
  <form name="redirect" action="http://captive.local/" method="get">
    <input type="hidden" name="mac" value="$(mac)" />
    <input type="hidden" name="ip"  value="$(ip)"  />
    <input type="hidden" name="dst" value="$(link-orig)" />
    <noscript>
      <p style="font-family:sans-serif;text-align:center;margin-top:40px">
        Tap below to continue to the CityNet portal:
      </p>
      <div style="text-align:center">
        <button type="submit"
          style="padding:12px 28px;font-size:16px;border-radius:8px;
                 background:#22d3ee;border:none;color:#000;cursor:pointer">
          Continue →
        </button>
      </div>
    </noscript>
  </form>
  <script>document.redirect.submit();</script>
</body>
</html>

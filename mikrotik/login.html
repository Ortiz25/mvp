<html>
<head>
  <title>CityNet</title>
  <!--
    MikroTik Hotspot login page — flash/hotspot/login.html
    
    Uses META REFRESH + noscript form for Android captive portal WebView
    compatibility. The WebView blocks JavaScript in many Android versions.
    
    Form passes only: mac, ip, dst (link-orig = the original destination URL).
    Do NOT include link-login — it causes a recursive redirect loop.
  -->
  <meta http-equiv="refresh" content="0;url=http://captive.local/?mac=$(mac)&ip=$(ip)&dst=$(link-orig)" />
</head>
<body>
  <!-- Fallback for browsers that don't support meta refresh -->
  <form name="redirect" action="http://captive.local/" method="get">
    <input type="hidden" name="mac" value="$(mac)" />
    <input type="hidden" name="ip"  value="$(ip)" />
    <input type="hidden" name="dst" value="$(link-orig)" />
    <noscript>
      <p>Tap below to continue:</p>
      <button type="submit">Continue to Portal</button>
    </noscript>
  </form>
  <script>document.redirect.submit();</script>
</body>
</html>

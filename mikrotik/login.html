<html>
<head>
  <title>CityNet</title>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>
<body>
<script>
  var mac = "$(mac)";
  var ip  = "$(ip)";
  var dst = "$(link-orig)";

  // If RouterOS substituted real values, mac will be like "0E:F6:67:09:FC:13"
  // If not substituted, it stays as literal "$(mac)"
  var macValid = mac && mac !== '$(mac)' && mac.indexOf('$') === -1;

  if (macValid) {
    window.location.replace(
      'http://captive.local/' +
      '?mac=' + encodeURIComponent(mac) +
      '&ip='  + encodeURIComponent(ip)  +
      '&dst=' + encodeURIComponent(dst)
    );
  } else {
    // OS probe or direct access — no MAC available yet.
    // Redirect without params; portal will poll /status to get MAC from backend.
    window.location.replace('http://captive.local/');
  }
</script>
</body>
</html>
